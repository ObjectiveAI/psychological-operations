<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>psyops panel</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: rgba(15, 17, 21, 0.92);
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      }
      #root {
        height: 100%;
      }
      /* Loading affordance: three dots that pulse one-by-one
         so the panel never sits blank while Rust is still
         figuring out which condition to publish.
         InstructionPanel renders these spans when the
         condition is `loading`. */
      @keyframes psyops-dot-flash {
        0%, 80%, 100% { opacity: 0.25; }
        40%           { opacity: 1; }
      }
      .psyops-dot {
        display: inline-block;
        font-size: 18px;
        line-height: 1;
        margin: 0 2px;
        animation: psyops-dot-flash 1.4s ease-in-out infinite;
      }
      .psyops-dot:nth-child(2) { animation-delay: 0.2s; }
      .psyops-dot:nth-child(3) { animation-delay: 0.4s; }
      /* Pulsating border on any non-loading panel state — gives
         the bar an "alive" feel without competing with the
         message text. Inset so it doesn't add to the panel's
         layout box; the React STYLE div sits at
         `position: absolute; inset: 0`. */
      @keyframes psyops-border-pulse {
        0%   { border-color: rgba(91, 148, 255, 0.7); }
        25%  { border-color: rgba(183, 91, 255, 0.7); }
        50%  { border-color: rgba(255, 91, 183, 0.7); }
        75%  { border-color: rgba(255, 183, 91, 0.7); }
        100% { border-color: rgba(91, 148, 255, 0.7); }
      }
      .psyops-pulse {
        box-sizing: border-box;
        border: 2px solid rgba(91, 148, 255, 0.7);
        animation: psyops-border-pulse 6s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/panel/main.tsx"></script>
  </body>
</html>
