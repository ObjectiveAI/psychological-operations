"$schema" = "../gen/schemas/desktop-schema.json"

[[permission]]
identifier = "allow-store-x-app-credential"
description = "Allows the content webview's overlay to ship a single X-App credential field (client_id / client_secret / bearer_token / access_token / access_token_secret) to Rust for per-handle on-disk storage."
commands.allow = ["store_x_app_credential"]
