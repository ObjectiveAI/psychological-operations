name: release

# Manual-only for now (`workflow_dispatch`). When you're ready for releases to
# cut automatically on a version bump, uncomment the `push` block — it fires
# when the CLI version bump lands on main.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths: ["psychological-operations-cli/Cargo.toml"]

permissions:
  contents: write

# Seven completely independent releasers — one per OS/arch (the cli_zip) plus
# the viewer. Each runs build.sh with the appropriate flag and uploads the zip
# build.sh produced, as-is. There is no shared/gating job: each leg ensures the
# vN release exists (`gh release create … || true`) before uploading, and
# fail-fast:false keeps one leg's failure from cancelling the others.
jobs:
  cli:
    name: cli ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        # Native runners (matching objectiveai's), NOT cross-compile: each zip
        # bundles that platform's CEF browser runtime, so it must build on its
        # own OS + arch.
        include:
          - { os: linux,   arch: x86_64,  runner: ubuntu-22.04 }
          - { os: linux,   arch: aarch64, runner: ubuntu-24.04-arm }
          - { os: macos,   arch: x86_64,  runner: macos-15-intel }
          - { os: macos,   arch: aarch64, runner: macos-14 }
          - { os: windows, arch: x86_64,  runner: windows-latest }
          - { os: windows, arch: aarch64, runner: windows-11-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (yarn — the browser frontend)
        shell: bash
        run: corepack enable
      - name: Build the cli_zip
        shell: bash
        run: bash build.sh --release --no-viewer
      - name: Upload the cli_zip
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' objectiveai.json | head -1)"
          ZIP=".objectiveai/bin/plugins/ObjectiveAI/psychological-operations/$VERSION/cli/psychological-operations-${{ matrix.os }}-${{ matrix.arch }}.zip"
          [ -f "$ZIP" ] || { echo "missing cli_zip: $ZIP" >&2; exit 1; }
          gh release create "v$VERSION" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "v$VERSION" --generate-notes || true
          gh release upload "v$VERSION" "$ZIP" --repo "$GITHUB_REPOSITORY" --clobber

  viewer:
    name: viewer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: psychological-operations-viewer/pnpm-lock.yaml
      - name: Build the viewer_zip
        shell: bash
        run: bash build.sh --release --no-cli
      - name: Upload the viewer_zip
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' objectiveai.json | head -1)"
          ZIP=".objectiveai/bin/plugins/ObjectiveAI/psychological-operations/$VERSION/viewer/psychological-operations-viewer.zip"
          [ -f "$ZIP" ] || { echo "missing viewer_zip: $ZIP" >&2; exit 1; }
          gh release create "v$VERSION" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "v$VERSION" --generate-notes || true
          gh release upload "v$VERSION" "$ZIP" --repo "$GITHUB_REPOSITORY" --clobber
