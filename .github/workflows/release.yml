name: release

# Manual-only for now (`workflow_dispatch`). When you're ready for the
# release to cut automatically on a version bump, uncomment the `push`
# block below — it fires when version.sh's CLI-version bump lands on main,
# exactly like mundus-animarum. (Left off so a routine push doesn't cut a
# release before we're ready.)
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths: ["psychological-operations-cli/Cargo.toml"]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version, verify sync, create release if new
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The CLI's package version is the release source of truth.
          VERSION=$(cargo metadata --no-deps --format-version 1 --manifest-path psychological-operations-cli/Cargo.toml \
            | jq -r '.packages[] | select(.name == "psychological-operations-cli") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI version: $VERSION"

          # `objectiveai plugins install` downloads releases/download/v<manifest
          # version>/…, and the viewer bundle ships under the same tag. If the
          # manifest or viewer drift from the CLI version the host fetches the
          # wrong release — fail loud before any build leg burns CI time.
          MANIFEST_VER=$(jq -r .version objectiveai.json)
          VIEWER_VER=$(jq -r .version psychological-operations-viewer/package.json)
          echo "Manifest: $MANIFEST_VER   Viewer: $VIEWER_VER"
          if [ "$VERSION" != "$MANIFEST_VER" ] || [ "$VERSION" != "$VIEWER_VER" ]; then
            echo "::error::version drift — CLI $VERSION / manifest $MANIFEST_VER / viewer $VIEWER_VER. Run \`bash version.sh $VERSION\` to resync."
            exit 1
          fi

          if gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            # Not a draft, so each build leg's asset is visible the moment it
            # uploads. Notes are auto-generated from the commits/PRs since the
            # last tag (no shell interpolation of commit messages).
            gh release create "v$VERSION" \
              --repo "${{ github.repository }}" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION" \
              --generate-notes
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-cli:
    name: CLI (${{ matrix.zip }})
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        # The six platforms enumerated by objectiveai.json::cli_zip
        # (3 OS × 2 arch). NATIVE runners + install.sh, NOT cross-compile:
        # the CLI embeds a per-platform CEF browser bundle at build time, so
        # each target must build on its own OS + arch.
        include:
          - { runner: ubuntu-22.04,     zip: psychological-operations-linux-x86_64.zip,    bin: psychological-operations }
          - { runner: ubuntu-22.04-arm, zip: psychological-operations-linux-aarch64.zip,   bin: psychological-operations }
          - { runner: macos-15-intel,   zip: psychological-operations-macos-x86_64.zip,    bin: psychological-operations }
          - { runner: macos-14,         zip: psychological-operations-macos-aarch64.zip,   bin: psychological-operations }
          - { runner: windows-latest,   zip: psychological-operations-windows-x86_64.zip,  bin: psychological-operations.exe }
          - { runner: windows-11-arm,   zip: psychological-operations-windows-aarch64.zip, bin: psychological-operations.exe }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Build CLI (embeds the CEF browser bundle)
        shell: bash
        run: bash psychological-operations-cli/install.sh
      - name: Dump build logs on failure
        if: failure()
        shell: bash
        run: |
          shopt -s nullglob
          for log in .logs/build/*.txt; do
            echo "::group::$log"; cat "$log"; echo "::endgroup::"
          done
      - name: Package zip
        # The host extracts cli_zip into the plugin's cli/ dir and runs
        # `exec` (./psychological-operations[.exe]) from there, so the zip
        # holds the single binary at its root. Copy to CWD first so the
        # archiver sees a relative path (a bash $HOME path doesn't survive
        # into PowerShell on the Windows legs).
        shell: bash
        run: |
          cp "$HOME/.psychological-operations/${{ matrix.bin }}" "./${{ matrix.bin }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -Command "Compress-Archive -Path '${{ matrix.bin }}' -DestinationPath '${{ matrix.zip }}' -Force"
          else
            zip -j "${{ matrix.zip }}" "${{ matrix.bin }}"
          fi
      - name: Upload to release
        # Each leg appends its asset the moment it finishes, so fast platforms
        # aren't gated on the slowest. `--clobber` keeps re-runs idempotent.
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "v${{ needs.prepare.outputs.version }}" "${{ matrix.zip }}" --repo "${{ github.repository }}" --clobber

  build-viewer:
    name: Viewer (psychological-operations-viewer.zip)
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: psychological-operations-viewer/pnpm-lock.yaml
      - name: Build viewer bundle
        # Produces psychological-operations-viewer.zip at the repo root —
        # the filename objectiveai.json::viewer_zip references.
        run: bash psychological-operations-viewer/build.sh
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.prepare.outputs.version }}" psychological-operations-viewer.zip --repo "${{ github.repository }}" --clobber
